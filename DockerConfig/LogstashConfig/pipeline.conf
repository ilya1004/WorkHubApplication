input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  json {
      source => "message"
      target => "log_entry"
  }

  date {
    match => ["timestamp", "ISO8601"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "workhub-logs-%{+YYYY.MM.dd}"
  }
}